name: Deploy to Google Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: simplebuildpro
  REGION: us-central1
  API_SERVICE: simplebuildpro-api
  WEB_SERVICE: simplebuildpro-web
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Type Check ───────────────────────────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  # ─── Unit & Integration Tests ───────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: simplebuildpro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run API Tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/simplebuildpro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-ci
          NODE_ENV: test
        run: npm run test:api

  # ─── Build & Push Docker Images ─────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    outputs:
      api_image: ${{ steps.build-api.outputs.image }}
      web_image: ${{ steps.build-web.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push API Image
        id: build-api
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }}"
          docker build -f infra/docker/Dockerfile.api -t $IMAGE .
          docker tag $IMAGE ${{ env.ARTIFACT_REGISTRY }}/api:latest
          docker push $IMAGE
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Build & Push Web Image
        id: build-web
        run: |
          IMAGE="${{ env.ARTIFACT_REGISTRY }}/web:${{ github.sha }}"
          docker build -f infra/docker/Dockerfile.web -t $IMAGE .
          docker tag $IMAGE ${{ env.ARTIFACT_REGISTRY }}/web:latest
          docker push $IMAGE
          docker push ${{ env.ARTIFACT_REGISTRY }}/web:latest
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  # ─── Database Migrations ─────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Start Cloud SQL Proxy
        run: |
          ./cloud-sql-proxy ${{ secrets.CLOUD_SQL_CONNECTION_NAME }} \
            --port 5432 &
          sleep 5

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for file in migrations/*.sql; do
            echo "Running migration: $file"
            PGPASSWORD="${{ secrets.DB_PASSWORD }}" psql \
              -h 127.0.0.1 \
              -U ${{ secrets.DB_USER }} \
              -d ${{ secrets.DB_NAME }} \
              -f "$file" \
              --set ON_ERROR_STOP=1
          done

  # ─── Deploy to Cloud Run ─────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API Service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.API_SERVICE }}
          image: ${{ needs.build.outputs.api_image }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=10
            --concurrency=80
            --timeout=60s
            --set-cloudsql-instances=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
            --port=8080
          env_vars: |
            NODE_ENV=production
            PORT=8080
          secrets: |
            DATABASE_URL=simplebuildpro-database-url:latest
            REDIS_URL=simplebuildpro-redis-url:latest
            JWT_SECRET=simplebuildpro-jwt-secret:latest
            JWT_REFRESH_SECRET=simplebuildpro-jwt-refresh-secret:latest
            GOOGLE_CLIENT_ID=simplebuildpro-google-client-id:latest
            GOOGLE_CLIENT_SECRET=simplebuildpro-google-client-secret:latest
            GITHUB_CLIENT_ID=simplebuildpro-github-client-id:latest
            GITHUB_CLIENT_SECRET=simplebuildpro-github-client-secret:latest
            STRIPE_SECRET_KEY=simplebuildpro-stripe-secret-key:latest
            STRIPE_WEBHOOK_SECRET=simplebuildpro-stripe-webhook-secret:latest
            ANTHROPIC_API_KEY=simplebuildpro-anthropic-api-key:latest
            GCS_BUCKET=simplebuildpro-gcs-bucket:latest
            NOVITA_API_KEY=simplebuildpro-novita-api-key:latest
            PAGESPEED_API_KEY=simplebuildpro-pagespeed-api-key:latest

      - name: Deploy Web Service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.WEB_SERVICE }}
          image: ${{ needs.build.outputs.web_image }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --min-instances=1
            --max-instances=5
            --concurrency=100
            --timeout=60s
            --port=3000
          env_vars: |
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=https://api.simplebuildpro.com
            NEXT_PUBLIC_APP_URL=https://app.simplebuildpro.com

      - name: Verify Deployments
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')

          echo "API URL: $API_URL"
          echo "Web URL: $WEB_URL"

          # Health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ API health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ API health check passed"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WEB_URL")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Web health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Web health check passed"

  # ─── Post-Deploy Notifications ───────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Author: ${{ github.actor }}"
          else
            echo "❌ Deployment failed!"
            echo "Check workflow logs for details."
          fi
