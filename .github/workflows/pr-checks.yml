name: Pull Request Checks

on:
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Code Quality ────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  # ─── Unit Tests ──────────────────────────────────────────────────────
  test:
    name: API Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: simplebuildpro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Run API Tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/simplebuildpro_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-ci
          NODE_ENV: test
        run: npm run test:api

  # ─── Docker Build Test ───────────────────────────────────────────────
  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Build API Image
        run: docker build -f infra/docker/Dockerfile.api -t simplebuildpro-api:test .

      - name: Build Web Image
        run: docker build -f infra/docker/Dockerfile.web -t simplebuildpro-web:test .

  # ─── Security Scan ──────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: NPM Audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          # Simple check for common secret patterns
          if grep -rn "sk_live_\|sk_test_\|AKIA[A-Z0-9]\{16\}" --include="*.ts" --include="*.tsx" --include="*.js" .; then
            echo "❌ Potential secrets found in code!"
            exit 1
          fi
          echo "✅ No secrets detected in code"
