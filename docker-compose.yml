version: '3.9'

services:
  # ─── PostgreSQL 16 ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: simplebuildpro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: simplebuild
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: simplebuildpro
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U simplebuild -d simplebuildpro']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 (Rate Limiting & Caching) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: simplebuildpro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru

  # ─── API Server (Hono) ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      target: builder
    container_name: simplebuildpro-api
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://simplebuild:localdev123@postgres:5432/simplebuildpro
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: local-dev-jwt-refresh-secret-change-in-production
      APP_URL: http://localhost:3000
      API_URL: http://localhost:8080
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GCS_BUCKET: ${GCS_BUCKET:-simplebuildpro-dev-assets}
      NOVITA_API_KEY: ${NOVITA_API_KEY:-}
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: npx tsx watch apps/api/src/index.ts

  # ─── Web Frontend (Next.js) ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      target: deps
    container_name: simplebuildpro-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    command: npm run dev --workspace=apps/web

  # ─── pgAdmin (Database Management UI) ───────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: simplebuildpro-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@simplebuildpro.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - '5050:5050'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # ─── Redis Commander (Redis UI) ─────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: simplebuildpro-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
