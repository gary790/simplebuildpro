# ============================================================
# SimpleBuild Pro — Cloud Build CI/CD Pipeline
# Triggered on push to main branch
# Builds and deploys both API and Web services
# ============================================================

steps:
  # Step 1: Build API Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-api'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api:latest'
      - '-f'
      - 'infra/docker/Dockerfile.api'
      - '.'

  # Step 2: Build Web Docker image (parallel with API)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-web'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web:latest'
      - '-f'
      - 'infra/docker/Dockerfile.web'
      - '.'

  # Step 3: Push API image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-api'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api']
    waitFor: ['build-api']

  # Step 4: Push Web image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-web'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web']
    waitFor: ['build-web']

  # Step 5: Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-api'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'simplebuildpro-api'
      - '--image=us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api:$SHORT_SHA'
      - '--region=us-central1'
      - '--project=simplebuildpro'
      - '--quiet'
    waitFor: ['push-api']

  # Step 6: Deploy Web to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-web'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - 'simplebuildpro-web'
      - '--image=us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web:$SHORT_SHA'
      - '--region=us-central1'
      - '--project=simplebuildpro'
      - '--quiet'
    waitFor: ['push-web']

  # Step 7: Verify deployments
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "=== Verifying deployments ==="
        curl -sf https://api.simplebuildpro.com/health/live || (echo "API health check failed!" && exit 1)
        echo ""
        echo "✅ API healthy"
        curl -sf -o /dev/null https://app.simplebuildpro.com/ || (echo "Web health check failed!" && exit 1)
        echo "✅ Web healthy"
        echo "=== Deployment complete ==="
    waitFor: ['deploy-api', 'deploy-web']

images:
  - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api:latest'
  - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s' # 30 minutes max
