steps:
  # Build API image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'infra/docker/Dockerfile.api'
      - '-t'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api:latest'
      - '.'
    id: 'build-api'

  # Push API image immediately (don't wait for web)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/api:latest'
    id: 'push-api'
    waitFor: ['build-api']

  # Build Web image (runs in parallel with push-api)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'infra/docker/Dockerfile.web'
      - '-t'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web:latest'
      - '.'
    id: 'build-web'
    waitFor: ['-']

  # Push Web image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/simplebuildpro/simplebuildpro/web:latest'
    id: 'push-web'
    waitFor: ['build-web']

logsBucket: 'gs://simplebuildpro_cloudbuild'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: GCS_ONLY

timeout: '1800s'
