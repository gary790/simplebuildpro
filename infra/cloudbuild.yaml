# ============================================================
# SimpleBuild Pro — Cloud Build CI/CD Pipeline
# Triggers on push to main branch
# Builds Docker images, pushes to Artifact Registry, deploys to Cloud Run
# ============================================================

steps:
  # ─── Step 1: Install dependencies and run tests ────────────
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        npm ci
        npm run build --workspace=packages/shared
        npm run build --workspace=packages/db
        npm run build --workspace=apps/api
    id: 'install-and-build'

  # ─── Step 2: Build API Docker image ────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/api:latest'
      - '-f'
      - 'infra/docker/Dockerfile.api'
      - '.'
    id: 'build-api'
    waitFor: ['install-and-build']

  # ─── Step 3: Build Web Docker image ────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/web:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/web:latest'
      - '-f'
      - 'infra/docker/Dockerfile.web'
      - '.'
    id: 'build-web'
    waitFor: ['install-and-build']

  # ─── Step 4: Push API image ────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/api'
    id: 'push-api'
    waitFor: ['build-api']

  # ─── Step 5: Push Web image ────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/web'
    id: 'push-web'
    waitFor: ['build-web']

  # ─── Step 6: Run database migrations ───────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Database migrations would run here via Cloud SQL proxy"
        echo "npx drizzle-kit migrate --config=packages/db/drizzle.config.ts"
    id: 'migrate-db'
    waitFor: ['push-api']

  # ─── Step 7: Deploy API to Cloud Run ───────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'simplebuildpro-api'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/api:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--min-instances=1'
      - '--max-instances=50'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--port=8080'
      - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=${PROJECT_ID}'
      - '--add-cloudsql-instances=${_CLOUDSQL_CONNECTION}'
      - '--vpc-connector=simplebuildpro-connector'
      - '--allow-unauthenticated'
    id: 'deploy-api'
    waitFor: ['push-api', 'migrate-db']

  # ─── Step 8: Deploy Web to Cloud Run ───────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'simplebuildpro-web'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/web:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--min-instances=1'
      - '--max-instances=20'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--port=3000'
      - '--set-env-vars=NODE_ENV=production,NEXT_PUBLIC_API_URL=https://api.simplebuildpro.com,NEXT_PUBLIC_APP_URL=https://simplebuildpro.com'
      - '--allow-unauthenticated'
    id: 'deploy-web'
    waitFor: ['push-web']

substitutions:
  _REGION: 'us-central1'
  _CLOUDSQL_CONNECTION: 'simplebuildpro:us-central1:simplebuildpro-db'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/api:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/web:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/simplebuildpro/web:latest'
